<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>나랑 데이트할래? 💕</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="alternate icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E💗%3C/text%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="favicon.svg" />
<style>
  :root {
    --pink: #ff6f91;
    --pink-soft: #ffb3c6;
    --pink-bg: #fff0f5;
    --purple: #b892ff;
    --text: #4a2c3a;
    --white: #ffffff;
    --shadow: 0 10px 30px rgba(255, 111, 145, 0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", sans-serif;
    color: var(--text);
  }

  body {
    min-height: 100dvh;
    background: linear-gradient(160deg, #ffe1ec 0%, #ffeaf2 40%, #f3e8ff 100%);
    display: flex;
    align-items: flex-start;   /* auto-margins on the card handle vertical centering */
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
    position: relative;
  }

  /* floating hearts background */
  .bg-hearts { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .bg-hearts span {
    position: absolute;
    bottom: -40px;
    font-size: 22px;
    opacity: 0.5;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    to { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    margin: auto;              /* centers vertically when it fits, scrolls when it doesn't */
    background: var(--white);
    border-radius: 28px;
    box-shadow: var(--shadow);
    padding: 32px 26px 34px;
    text-align: center;
    animation: popIn 0.5s cubic-bezier(0.2, 1.3, 0.4, 1);
  }
  @keyframes popIn {
    from { transform: scale(0.85) translateY(20px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }

  /* progress dots */
  .progress { display: flex; gap: 8px; justify-content: center; margin-bottom: 22px; }
  .progress .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--pink-soft); opacity: 0.4; transition: 0.3s;
  }
  .progress .dot.active { opacity: 1; background: var(--pink); transform: scale(1.25); }

  h1 { font-size: 26px; line-height: 1.4; margin-bottom: 10px; }
  h2 { font-size: 22px; line-height: 1.4; margin-bottom: 8px; }
  .sub { color: #9a7686; font-size: 15px; margin-bottom: 24px; }

  .step { display: none; }
  .step.active { display: block; animation: fadeSlide 0.45s ease; }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateX(24px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .btn {
    border: none;
    border-radius: 16px;
    font-size: 18px;
    font-weight: 700;
    padding: 15px 26px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
    font-family: inherit;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: #fff;
    box-shadow: 0 8px 18px rgba(255, 111, 145, 0.4);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(255, 111, 145, 0.5); }
  .btn-primary:active { transform: translateY(0) scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* step 1 buttons */
  .yesno { display: flex; gap: 16px; justify-content: center; margin-top: 26px; flex-wrap: wrap; }
  .btn-yes {
    background: linear-gradient(135deg, #ff8fab, #ff6f91);
    color: #fff;
    box-shadow: 0 8px 18px rgba(255, 111, 145, 0.45);
    transition: transform 0.15s, font-size 0.3s;
  }
  .btn-yes:hover { transform: translateY(-3px) scale(1.04); }
  /* playful attention wiggle — rotate/translate only, never resizes (so nothing gets covered) */
  .btn-yes.wiggle { animation: yesWiggle 0.5s ease; }
  @keyframes yesWiggle {
    0%, 100% { transform: rotate(0) translateY(0); }
    20%      { transform: rotate(-7deg) translateY(-5px); }
    40%      { transform: rotate(6deg) translateY(0); }
    60%      { transform: rotate(-4deg) translateY(-3px); }
    80%      { transform: rotate(3deg) translateY(0); }
  }
  .btn-no {
    background: #f0e6ec;
    color: #a98ba0;
  }
  /* on desktop the no-button dodges — position it absolutely when fleeing */
  .btn-no.fleeing {
    position: fixed;
    z-index: 50;
    transform-origin: center center;
    transition: left 0.12s ease, top 0.12s ease, transform 0.2s ease;
  }

  /* calendar */
  .cal { user-select: none; }
  .cal-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .cal-head button {
    border: none; background: var(--pink-bg); color: var(--pink);
    width: 38px; height: 38px; border-radius: 12px; font-size: 20px;
    cursor: pointer; font-weight: 700; transition: 0.2s;
  }
  .cal-head button:hover { background: var(--pink-soft); color: #fff; }
  .cal-title { font-size: 18px; font-weight: 700; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-grid .wd { font-size: 12px; color: #b79aa8; padding: 6px 0; font-weight: 600; }
  .cal-day {
    aspect-ratio: 1 / 1;
    display: flex; align-items: center; justify-content: center;
    border-radius: 12px; font-size: 15px; cursor: pointer;
    transition: 0.15s; color: var(--text);
  }
  .cal-day.empty { cursor: default; }
  .cal-day.past { color: #d8c6d0; cursor: not-allowed; }
  .cal-day.sun { color: #ff8fab; }
  .cal-day:not(.empty):not(.past):hover { background: var(--pink-bg); }
  .cal-day.selected {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: #fff; font-weight: 700; transform: scale(1.05);
  }
  .cal-day.today { box-shadow: inset 0 0 0 2px var(--pink-soft); }

  /* activity checkboxes */
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 8px; }
  .opt {
    position: relative; display: flex; align-items: center; gap: 10px;
    padding: 16px 14px; border-radius: 16px; cursor: pointer;
    background: #faf3f7; border: 2px solid transparent; transition: 0.18s;
    text-align: left; font-size: 15px; font-weight: 600;
  }
  .opt:hover { background: var(--pink-bg); }
  .opt input { position: absolute; opacity: 0; pointer-events: none; }
  .opt .emoji { font-size: 22px; }
  .opt.checked {
    background: var(--pink-bg);
    border-color: var(--pink);
    box-shadow: 0 4px 12px rgba(255, 111, 145, 0.2);
  }
  .opt.checked::after {
    content: "✓"; position: absolute; top: 8px; right: 10px;
    color: var(--pink); font-weight: 900; font-size: 14px;
  }

  /* step 4 grouped options */
  .group { margin-bottom: 22px; text-align: left; }
  .group h3 { font-size: 17px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .chips { display: flex; flex-wrap: wrap; gap: 10px; }
  .chip {
    padding: 10px 16px; border-radius: 999px; background: #faf3f7;
    border: 2px solid transparent; cursor: pointer; font-size: 14px;
    font-weight: 600; transition: 0.18s; color: var(--text);
  }
  .chip:hover { background: var(--pink-bg); }
  .chip.checked {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: #fff; border-color: transparent;
  }

  .nav { display: flex; gap: 12px; margin-top: 26px; }
  .nav .btn { flex: 1; }
  .btn-ghost { background: #f3e8ef; color: #a98ba0; }
  .btn-ghost:hover { background: #ecdae6; }

  /* final summary */
  .summary { text-align: left; background: var(--pink-bg); border-radius: 18px; padding: 20px; margin: 20px 0; }
  .summary .row { display: flex; gap: 10px; margin-bottom: 14px; }
  .summary .row:last-child { margin-bottom: 0; }
  .summary .ico { font-size: 20px; }
  .summary .lbl { font-size: 13px; color: #9a7686; margin-bottom: 3px; }
  .summary .val { font-size: 15px; font-weight: 600; line-height: 1.5; }

  .big-heart { font-size: 60px; animation: beat 1s ease-in-out infinite; display: inline-block; }
  @keyframes beat { 0%,100%{transform:scale(1);} 25%{transform:scale(1.2);} 50%{transform:scale(0.95);} }

  .hint { font-size: 12px; color: #c2a7b5; margin-top: 14px; }

  .make-own { margin-top: 18px; margin-bottom: 0; }
  .make-own a { color: #b892ff; font-size: 13px; font-weight: 600; text-decoration: none; }
  .make-own a:hover { text-decoration: underline; }
  .make-own-btn {
    display: block; width: 100%; box-sizing: border-box;
    text-decoration: none; margin-top: 4px;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: #fff; box-shadow: 0 8px 18px rgba(255, 111, 145, 0.4);
  }

  /* the "아니" teasing message — make it pop and stay clear of the growing Yes button */
  #noHint {
    position: relative;
    z-index: 60;               /* sit above the pinned/growing Yes button */
    min-height: 24px;
    margin-top: 54px;          /* leave room so the enlarged Yes button never covers it */
    font-size: 17px;
    font-weight: 700;
    color: var(--pink);
  }
  #noHint:not(:empty) {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 999px;
    background: var(--pink-bg);   /* readable pill even if the button drifts close */
    box-shadow: 0 4px 12px rgba(255, 111, 145, 0.18);
  }
  #noHint.show { animation: teasePop 0.35s cubic-bezier(0.2, 1.4, 0.4, 1); }
  @keyframes teasePop {
    0%   { transform: scale(0.6); opacity: 0; }
    60%  { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  @media (max-width: 380px) {
    h1 { font-size: 23px; }
    .options { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="bg-hearts" id="bgHearts"></div>

<div class="card">
  <div class="progress" id="progress">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <!-- STEP 1 -->
  <section class="step active" id="step1">
    <div class="big-heart">💕</div>
    <h1 id="qTitle">나랑 데이트할래?</h1>
    <p class="sub" id="qSub">용기 내서 물어봐요 🥰</p>
    <div class="yesno" id="yesno">
      <button class="btn btn-yes" id="btnYes">응! 좋아 💗</button>
      <button class="btn btn-no" id="btnNo">아니</button>
    </div>
    <p class="hint" id="noHint"></p>
  </section>

  <!-- STEP 2 -->
  <section class="step" id="step2">
    <h2>언제 만날까? 📅</h2>
    <p class="sub">데이트하고 싶은 날짜를 골라줘</p>
    <div class="cal" id="calendar"></div>
    <div class="nav">
      <button class="btn btn-ghost" data-prev>← 이전</button>
      <button class="btn btn-primary" id="toStep3" disabled>다음 →</button>
    </div>
  </section>

  <!-- STEP 3 -->
  <section class="step" id="step3">
    <h2>뭐 하고 싶어? 🎈</h2>
    <p class="sub">같이 하고 싶은 걸 다 골라줘 (여러 개 가능!)</p>
    <div class="options" id="activities"></div>
    <div class="nav">
      <button class="btn btn-ghost" data-prev>← 이전</button>
      <button class="btn btn-primary" id="toStep4" disabled>다음 →</button>
    </div>
  </section>

  <!-- STEP 4 -->
  <section class="step" id="step4">
    <h2>좀 더 자세히! ✨</h2>
    <p class="sub">고른 것마다 원하는 걸 정해줘</p>
    <div id="detailGroups"></div>
    <div class="nav">
      <button class="btn btn-ghost" data-prev>← 이전</button>
      <button class="btn btn-primary" id="toFinish">완성하기 💖</button>
    </div>
  </section>

  <!-- FINAL -->
  <section class="step" id="stepFinal">
    <div class="big-heart">🎉</div>
    <h1>데이트 약속 완성!</h1>
    <p class="sub">이렇게 데이트하자 💑</p>
    <div class="summary" id="summary"></div>
    <button class="btn btn-primary" style="width:100%" id="btnReply">💌 답장 링크 복사하기</button>
    <button class="btn btn-ghost" style="width:100%; margin-top:12px" id="btnShare">📋 내용 텍스트로 복사</button>
    <button class="btn btn-ghost" style="width:100%; margin-top:12px" id="btnSave">📸 이미지로 저장하기</button>
    <p class="hint" id="shareHint">답장 링크를 복사해서 신청한 사람에게 보내줘! 💌</p>
    <p class="make-own"><a href="create.html">나도 데이트 신청 만들기 →</a></p>
  </section>

  <!-- REPLY VIEW (creator opens the recipient's answer link) -->
  <section class="step" id="stepReply">
    <div class="big-heart">🎉</div>
    <h1 id="replyTitle">데이트 수락!</h1>
    <p class="sub" id="replySub">이렇게 데이트하고 싶대요 💑</p>
    <div class="summary" id="replySummary"></div>
    <a class="btn make-own-btn" href="create.html">💕 나도 데이트 신청 만들기</a>
  </section>
</div>

<script>
(async function () {
  "use strict";

  // ---- device detection ----
  var isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

  // ---- state ----
  var state = {
    date: null,          // {y, m, d}
    activities: [],      // list of activity keys
    details: {}          // { activityKey: [selected options] }
  };

  // ---- compact, URL-safe encoding (deflate when the browser supports it).
  //      No DB: all config/replies live in the URL. Format: 1-char scheme tag
  //      ('D' deflate-raw, 'P' plain) + URL-safe base64. Legacy untagged base64
  //      is still accepted on decode. ----
  function bytesToB64url(bytes) {
    var bin = "";
    for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }
  function b64urlToBytes(str) {
    var b = str.replace(/-/g, '+').replace(/_/g, '/');
    while (b.length % 4) b += '=';
    var bin = atob(b), out = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }
  var CAN_COMPRESS = (typeof CompressionStream !== 'undefined' && typeof DecompressionStream !== 'undefined');
  async function deflateBytes(bytes) {
    var cs = new CompressionStream('deflate-raw');
    var w = cs.writable.getWriter(); w.write(bytes); w.close();
    return new Uint8Array(await new Response(cs.readable).arrayBuffer());
  }
  async function inflateBytes(bytes) {
    var ds = new DecompressionStream('deflate-raw');
    var w = ds.writable.getWriter(); w.write(bytes); w.close();
    return new Uint8Array(await new Response(ds.readable).arrayBuffer());
  }
  async function encodeData(obj) {
    var utf8 = new TextEncoder().encode(JSON.stringify(obj));
    if (CAN_COMPRESS) {
      try { return 'D' + bytesToB64url(await deflateBytes(utf8)); } catch (e) {}
    }
    return 'P' + bytesToB64url(utf8);
  }
  async function decodeData(str) {
    var tag = str.charAt(0);
    if (tag === 'D' || tag === 'P') {
      var bytes = b64urlToBytes(str.slice(1));
      if (tag === 'D') bytes = await inflateBytes(bytes);
      return JSON.parse(new TextDecoder().decode(bytes));
    }
    // legacy: untagged plain base64url of the UTF-8 JSON
    var b = str.replace(/-/g, '+').replace(/_/g, '/');
    while (b.length % 4) b += '=';
    return JSON.parse(decodeURIComponent(escape(atob(b))));
  }
  function baseUrl() { return location.href.split("#")[0]; }

  // ---- default activity definitions ----
  var DEFAULT_ACTIVITIES = [
    { emoji: "🍽️", label: "식사하기", q: "뭘 먹고 싶어?",   opts: ["돈까스", "밀면", "떡볶이", "파스타", "초밥", "고기"] },
    { emoji: "🎬", label: "영화보기", q: "무슨 영화 볼까?",  opts: ["액션", "로맨스", "코미디", "공포", "애니메이션"] },
    { emoji: "☕", label: "카페가기", q: "어떤 카페 갈까?",  opts: ["조용한 카페", "디저트 맛집", "뷰 좋은 곳", "브런치 카페"] },
    { emoji: "🚶", label: "산책하기", q: "어디서 산책할까?", opts: ["강변", "공원", "바닷가", "예쁜 골목길"] },
    { emoji: "🛍️", label: "쇼핑하기", q: "뭐 사러 갈까?",   opts: ["옷", "신발", "소품", "화장품"] },
    { emoji: "🚗", label: "드라이브", q: "어디로 드라이브?", opts: ["바다", "산", "야경 명소", "드라이브 카페"] },
    { emoji: "🎮", label: "게임하기", q: "무슨 게임 할까?",  opts: ["방탈출", "오락실", "보드게임", "PC방"] },
    { emoji: "🏠", label: "집데이트", q: "집에서 뭐 할까?",  opts: ["넷플릭스", "요리", "보드게임", "낮잠"] }
  ];

  // ---- read mode + config from the URL hash ----
  //   #c=...  → customized invitation   |   #r=...  → reply view (creator sees answer)
  var hash = location.hash || "";
  var MODE = "invite";
  var CONFIG = null, REPLY = null;
  try {
    if (hash.indexOf("#r=") === 0) { MODE = "reply"; REPLY = await decodeData(hash.slice(3)); }
    else if (hash.indexOf("#c=") === 0) { CONFIG = await decodeData(hash.slice(3)); }
  } catch (e) { CONFIG = null; REPLY = null; }

  // ---- build ACTIVITIES from config (short keys e/l/q/o) or defaults ----
  var srcActs = (CONFIG && CONFIG.a && CONFIG.a.length) ? CONFIG.a : DEFAULT_ACTIVITIES;
  var ACTIVITIES = srcActs.map(function (a, i) {
    return {
      key: "a" + i,
      emoji: a.emoji || a.e || "💗",
      label: a.label || a.l || "활동",
      q: a.q || "뭐 하고 싶어?",
      opts: a.opts || a.o || []
    };
  });

  var $ = function (id) { return document.getElementById(id); };

  // ============ background hearts ============
  (function makeHearts() {
    var wrap = $("bgHearts");
    var emojis = ["💗", "💕", "💖", "🩷", "💘"];
    for (var i = 0; i < 14; i++) {
      var s = document.createElement("span");
      s.textContent = emojis[i % emojis.length];
      s.style.left = (Math.random() * 100) + "%";
      var dur = 8 + Math.random() * 10;
      s.style.animationDuration = dur + "s";
      s.style.animationDelay = (-Math.random() * dur) + "s";
      s.style.fontSize = (16 + Math.random() * 18) + "px";
      wrap.appendChild(s);
    }
  })();

  // ============ apply custom invitation text ============
  (function applyConfig() {
    if (!CONFIG) return;
    if (CONFIG.q) $("qTitle").textContent = CONFIG.q;
    else if (CONFIG.n) $("qTitle").textContent = CONFIG.n + "야, 나랑 데이트할래?";
    if (CONFIG.s) $("qSub").textContent = CONFIG.s;
    if (CONFIG.n) document.title = $("qTitle").textContent + " 💕";
  })();

  // ============ step navigation ============
  var steps = ["step1", "step2", "step3", "step4", "stepFinal"];
  var current = 0;

  function goTo(index) {
    if (index === 3) buildDetails();     // build step 4 from step 3 choices
    if (index === 4) buildSummary();     // build final summary
    $(steps[current]).classList.remove("active");
    current = index;
    $(steps[current]).classList.add("active");
    updateProgress();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function updateProgress() {
    var dots = $("progress").children;
    // 5 screens map onto 4 dots; final keeps all lit
    var lit = Math.min(current, 3);
    for (var i = 0; i < dots.length; i++) {
      dots[i].classList.toggle("active", i <= lit);
    }
  }
  updateProgress();

  // previous buttons
  var prevBtns = document.querySelectorAll("[data-prev]");
  prevBtns.forEach(function (b) {
    b.addEventListener("click", function () { goTo(current - 1); });
  });

  // ============ STEP 1: yes / no ============
  var btnYes = $("btnYes");
  var btnNo = $("btnNo");
  var noHint = $("noHint");
  var dodgeCount = 0;
  var teasing = [
    "에이~ 다시 생각해봐 🥺",
    "정말? 진짜로? 🙈",
    "안 돼안 돼, 눌러줘 💔",
    "한 번만 더 생각해줘 🥹",
    "'응' 이 더 커보이지 않아? 😆",
    "도망 못 가지롱~ 🏃💨",
    "포기 안 할 거야 💗"
  ];

  btnYes.addEventListener("click", function () { goTo(1); });

  // Both desktop and mobile: the No button hops to a random spot on click.
  btnNo.addEventListener("click", function (e) {
    e.preventDefault();
    teaseAndMove();
  });

  var noScale = 1;

  function nextTease() {
    noHint.textContent = teasing[dodgeCount % teasing.length];
    // restart the pop animation on every update
    noHint.classList.remove("show");
    void noHint.offsetWidth;
    noHint.classList.add("show");
    dodgeCount++;
    wiggleYes();  // draw attention to Yes without changing its size
    shrinkNo();   // the No button keeps shrinking away
  }

  // quick attention wiggle on Yes (rotate/translate only — no resize, covers nothing)
  function wiggleYes() {
    btnYes.classList.remove("wiggle");
    void btnYes.offsetWidth; // restart the animation each time
    btnYes.classList.add("wiggle");
  }

  // shrink the No button a little on every attempt, down to a floor
  function shrinkNo() {
    noScale = Math.max(noScale - 0.08, 0.5);
    btnNo.style.transform = "scale(" + noScale + ")";
  }

  // pin the Yes button where it currently sits so that when the No button
  // leaves the flex flow (goes fixed), Yes doesn't get re-centered / shifted.
  function pinYesInPlace() {
    if (btnYes.dataset.pinned) return;
    var r = btnYes.getBoundingClientRect();
    btnYes.style.position = "fixed";
    btnYes.style.left = r.left + "px";
    btnYes.style.top = r.top + "px";
    btnYes.style.width = r.width + "px";
    btnYes.style.height = r.height + "px";
    btnYes.style.margin = "0";
    btnYes.style.transformOrigin = "center center";
    btnYes.dataset.pinned = "1";
  }

  // when the button first starts fleeing, pin it to its CURRENT on-screen
  // position (so it doesn't snap from the flex layout), then force a reflow
  // so the very first move animates smoothly like the following ones.
  function startFleeingIfNeeded() {
    if (btnNo.classList.contains("fleeing")) return;
    pinYesInPlace(); // lock Yes so it doesn't shift when No leaves the flow
    var rect = btnNo.getBoundingClientRect();
    btnNo.style.width = rect.width + "px";
    btnNo.style.height = rect.height + "px";
    btnNo.classList.add("fleeing");
    btnNo.style.left = rect.left + "px";
    btnNo.style.top = rect.top + "px";
    void btnNo.offsetWidth; // flush layout so the transition has a start point
  }

  function moveNoTo(pad) {
    var bw = btnNo.offsetWidth || 90;
    var bh = btnNo.offsetHeight || 52;
    var maxX = window.innerWidth - bw - pad;
    var maxY = window.innerHeight - bh - pad;
    var x = pad + Math.random() * Math.max(0, maxX - pad);
    var y = pad + Math.random() * Math.max(0, maxY - pad);
    btnNo.style.left = x + "px";
    btnNo.style.top = y + "px";
  }

  function teaseAndMove() {
    startFleeingIfNeeded();          // pin Yes + capture No's natural size first
    nextTease();                     // then wiggle Yes and shrink No
    moveNoTo(isTouch ? 12 : 16);     // hop to a random spot
  }

  // ============ STEP 2: calendar ============
  var calWrap = $("calendar");
  var today = new Date();
  today.setHours(0, 0, 0, 0);
  var viewY = today.getFullYear();
  var viewM = today.getMonth(); // 0-based

  function renderCalendar() {
    var wds = ["일", "월", "화", "수", "목", "금", "토"];
    var first = new Date(viewY, viewM, 1);
    var startDow = first.getDay();
    var daysInMonth = new Date(viewY, viewM + 1, 0).getDate();

    var html = '';
    html += '<div class="cal-head">';
    html += '<button type="button" id="calPrev" aria-label="이전 달">‹</button>';
    html += '<div class="cal-title">' + viewY + '년 ' + (viewM + 1) + '월</div>';
    html += '<button type="button" id="calNext" aria-label="다음 달">›</button>';
    html += '</div>';
    html += '<div class="cal-grid">';
    for (var w = 0; w < 7; w++) html += '<div class="wd">' + wds[w] + '</div>';
    for (var e = 0; e < startDow; e++) html += '<div class="cal-day empty"></div>';

    for (var d = 1; d <= daysInMonth; d++) {
      var cellDate = new Date(viewY, viewM, d);
      cellDate.setHours(0, 0, 0, 0);
      var cls = "cal-day";
      var dow = cellDate.getDay();
      if (dow === 0) cls += " sun";
      var isPast = cellDate.getTime() < today.getTime();
      if (isPast) cls += " past";
      if (cellDate.getTime() === today.getTime()) cls += " today";
      if (state.date && state.date.y === viewY && state.date.m === viewM && state.date.d === d) cls += " selected";
      var attr = isPast ? '' : ' data-day="' + d + '"';
      html += '<div class="' + cls + '"' + attr + '>' + d + '</div>';
    }
    html += '</div>';
    calWrap.innerHTML = html;

    $("calPrev").addEventListener("click", function () {
      // don't navigate before current month
      if (viewY === today.getFullYear() && viewM === today.getMonth()) return;
      viewM--; if (viewM < 0) { viewM = 11; viewY--; }
      renderCalendar();
    });
    $("calNext").addEventListener("click", function () {
      viewM++; if (viewM > 11) { viewM = 0; viewY++; }
      renderCalendar();
    });

    calWrap.querySelectorAll(".cal-day[data-day]").forEach(function (cell) {
      cell.addEventListener("click", function () {
        var d = parseInt(cell.getAttribute("data-day"), 10);
        state.date = { y: viewY, m: viewM, d: d };
        renderCalendar();
        $("toStep3").disabled = false;
      });
    });
  }
  renderCalendar();
  $("toStep3").addEventListener("click", function () { if (state.date) goTo(2); });

  // ============ STEP 3: activities ============
  var actWrap = $("activities");
  ACTIVITIES.forEach(function (a) {
    var label = document.createElement("label");
    label.className = "opt";
    label.innerHTML =
      '<input type="checkbox" value="' + a.key + '">' +
      '<span class="emoji">' + a.emoji + '</span>' +
      '<span>' + a.label + '</span>';
    var input = label.querySelector("input");
    input.addEventListener("change", function () {
      label.classList.toggle("checked", input.checked);
      if (input.checked) {
        if (state.activities.indexOf(a.key) === -1) state.activities.push(a.key);
      } else {
        state.activities = state.activities.filter(function (k) { return k !== a.key; });
        delete state.details[a.key];
      }
      $("toStep4").disabled = state.activities.length === 0;
    });
    actWrap.appendChild(label);
  });
  $("toStep4").addEventListener("click", function () { if (state.activities.length) goTo(3); });

  // ============ STEP 4: details per chosen activity ============
  function buildDetails() {
    var wrap = $("detailGroups");
    wrap.innerHTML = "";
    // keep activity order consistent with the master list
    ACTIVITIES.forEach(function (a) {
      if (state.activities.indexOf(a.key) === -1) return;
      if (!state.details[a.key]) state.details[a.key] = [];

      var group = document.createElement("div");
      group.className = "group";
      var h = document.createElement("h3");
      h.innerHTML = '<span>' + a.emoji + '</span> ' + a.q;
      group.appendChild(h);

      var chips = document.createElement("div");
      chips.className = "chips";
      a.opts.forEach(function (opt) {
        var chip = document.createElement("div");
        chip.className = "chip";
        chip.textContent = opt;
        if (state.details[a.key].indexOf(opt) !== -1) chip.classList.add("checked");
        chip.addEventListener("click", function () {
          var arr = state.details[a.key];
          var idx = arr.indexOf(opt);
          if (idx === -1) { arr.push(opt); chip.classList.add("checked"); }
          else { arr.splice(idx, 1); chip.classList.remove("checked"); }
        });
        chips.appendChild(chip);
      });
      group.appendChild(chips);
      wrap.appendChild(group);
    });
  }
  $("toFinish").addEventListener("click", function () { goTo(4); });

  // ============ FINAL: summary ============
  function formatDate() {
    if (!state.date) return "-";
    var wds = ["일", "월", "화", "수", "목", "금", "토"];
    var dt = new Date(state.date.y, state.date.m, state.date.d);
    return state.date.y + "년 " + (state.date.m + 1) + "월 " + state.date.d + "일 (" + wds[dt.getDay()] + ")";
  }

  function buildSummary() {
    var s = $("summary");
    var rows = "";
    rows += '<div class="row"><span class="ico">📅</span><div><div class="lbl">데이트 날짜</div><div class="val">' + formatDate() + '</div></div></div>';

    var actLines = [];
    ACTIVITIES.forEach(function (a) {
      if (state.activities.indexOf(a.key) === -1) return;
      var picked = (state.details[a.key] || []);
      var line = a.emoji + " " + a.label;
      if (picked.length) line += " <span style='color:#9a7686'>— " + picked.join(", ") + "</span>";
      actLines.push(line);
    });
    rows += '<div class="row"><span class="ico">💝</span><div><div class="lbl">하고 싶은 것</div><div class="val">' + actLines.join("<br>") + '</div></div></div>';
    s.innerHTML = rows;
  }

  // copy to clipboard
  $("btnShare").addEventListener("click", function () {
    var lines = [];
    lines.push("💕 우리 데이트 약속 💕");
    lines.push("");
    lines.push("📅 " + formatDate());
    lines.push("");
    lines.push("하고 싶은 것:");
    ACTIVITIES.forEach(function (a) {
      if (state.activities.indexOf(a.key) === -1) return;
      var picked = (state.details[a.key] || []);
      var line = "• " + a.emoji + " " + a.label;
      if (picked.length) line += " (" + picked.join(", ") + ")";
      lines.push(line);
    });
    lines.push("");
    lines.push("우리 이렇게 데이트하자! 💑");
    var text = lines.join("\n");

    function done() {
      $("shareHint").textContent = "복사 완료! 나한테 카톡이나 DM으로 보내줘 💌";
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function () { fallbackCopy(text); done(); });
    } else {
      fallbackCopy(text); done();
    }
  });

  function fallbackCopy(text) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand("copy"); } catch (e) {}
    document.body.removeChild(ta);
  }

  // ============ save summary as an image ============
  var POSTER_FF = '-apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif';

  function buildActivityStrings() {
    var out = [];
    ACTIVITIES.forEach(function (a) {
      if (state.activities.indexOf(a.key) === -1) return;
      var picked = state.details[a.key] || [];
      var s = a.emoji + "  " + a.label;
      if (picked.length) s += " — " + picked.join(", ");
      out.push(s);
    });
    return out;
  }

  // greedy per-character wrap (Korean text often has no spaces to break on)
  function wrapText(ctx, text, maxW) {
    var lines = [], line = "";
    for (var i = 0; i < text.length; i++) {
      var t = line + text[i];
      if (ctx.measureText(t).width > maxW && line) { lines.push(line); line = text[i]; }
      else line = t;
    }
    if (line) lines.push(line);
    return lines;
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function saveImage() {
    var S = 2;                       // supersample for a crisp export
    var W = 760, M = 40, cardPad = 46;
    var cardW = W - M * 2;
    var innerX = M + cardPad;
    var innerW = cardW - cardPad * 2;
    var cx = W / 2;

    var fTitle = '700 34px ' + POSTER_FF;
    var fLabel = '600 16px ' + POSTER_FF;
    var fDate  = '700 25px ' + POSTER_FF;
    var fAct   = '600 20px ' + POSTER_FF;
    var fFoot  = '600 19px ' + POSTER_FF;

    // measure + wrap the activity lines first so we know the canvas height
    var meas = document.createElement("canvas").getContext("2d");
    meas.font = fAct;
    var actLines = [];
    buildActivityStrings().forEach(function (str) {
      wrapText(meas, str, innerW).forEach(function (l) { actLines.push(l); });
    });
    if (!actLines.length) actLines.push("(아직 안 골랐어요)");

    var H = 394 + actLines.length * 36;   // fixed layout height + per-line height

    var canvas = document.createElement("canvas");
    canvas.width = W * S; canvas.height = H * S;
    var ctx = canvas.getContext("2d");
    ctx.scale(S, S);
    ctx.textBaseline = "top";

    // background gradient (matches the app)
    var g = ctx.createLinearGradient(0, 0, W, H);
    g.addColorStop(0, "#ffe1ec");
    g.addColorStop(0.5, "#ffeaf2");
    g.addColorStop(1, "#f3e8ff");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // decorative hearts scattered in the margins
    ctx.globalAlpha = 0.35;
    ctx.font = "26px " + POSTER_FF;
    var hearts = ["💗", "💕", "💖"];
    var spots = [[16, 20], [W - 44, 26], [18, H - 66], [W - 40, H - 52], [cx - 12, 12]];
    spots.forEach(function (p, i) { ctx.fillText(hearts[i % hearts.length], p[0], p[1]); });
    ctx.globalAlpha = 1;

    // white card with soft shadow
    ctx.save();
    ctx.shadowColor = "rgba(255,111,145,0.3)";
    ctx.shadowBlur = 30; ctx.shadowOffsetY = 12;
    ctx.fillStyle = "#ffffff";
    roundRect(ctx, M, M, cardW, H - M * 2, 28);
    ctx.fill();
    ctx.restore();

    var y = M + cardPad;

    // title
    ctx.fillStyle = "#ff4d79"; ctx.font = fTitle; ctx.textAlign = "center";
    ctx.fillText("💕 우리 데이트 약속 💕", cx, y);
    y += 46 + 22;

    ctx.textAlign = "left";
    // date
    ctx.fillStyle = "#9a7686"; ctx.font = fLabel;
    ctx.fillText("📅 데이트 날짜", innerX, y);
    y += 24 + 4;
    ctx.fillStyle = "#4a2c3a"; ctx.font = fDate;
    ctx.fillText(formatDate(), innerX, y);
    y += 34 + 26;

    // activities
    ctx.fillStyle = "#9a7686"; ctx.font = fLabel;
    ctx.fillText("💝 하고 싶은 것", innerX, y);
    y += 24 + 14;
    ctx.fillStyle = "#4a2c3a"; ctx.font = fAct;
    actLines.forEach(function (l) { ctx.fillText(l, innerX, y); y += 36; });
    y += 28;

    // footer
    ctx.fillStyle = "#9a6bd0"; ctx.font = fFoot; ctx.textAlign = "center";
    ctx.fillText("우리 이렇게 데이트하자 💑", cx, y);

    // export as PNG
    canvas.toBlob(function (blob) {
      if (!blob) { $("shareHint").textContent = "이미지 저장에 실패했어요 😢"; return; }
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "데이트약속.png";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(function () { URL.revokeObjectURL(url); }, 1500);
      $("shareHint").textContent = "이미지 저장 완료! 갤러리에서 확인해줘 📸";
    }, "image/png");
  }

  $("btnSave").addEventListener("click", saveImage);

  // ============ reply link (recipient → creator, no DB) ============
  function buildReplyPayload() {
    var d = state.date ? [state.date.y, state.date.m, state.date.d] : null;
    var c = [];
    ACTIVITIES.forEach(function (a) {
      if (state.activities.indexOf(a.key) === -1) return;
      c.push({ e: a.emoji, l: a.label, o: (state.details[a.key] || []) });
    });
    var payload = { d: d, c: c };
    if (CONFIG && CONFIG.n) payload.n = CONFIG.n; // carry the name back to the creator
    return payload;
  }

  $("btnReply").addEventListener("click", async function () {
    var link = baseUrl() + "#r=" + await encodeData(buildReplyPayload());
    function done() { $("shareHint").textContent = "답장 링크 복사 완료! 신청한 사람에게 보내줘 💌"; }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(link).then(done, function () { fallbackCopy(link); done(); });
    } else { fallbackCopy(link); done(); }
  });

  // ============ reply view: creator opens the recipient's #r= link ============
  function renderReply() {
    var wds = ["일", "월", "화", "수", "목", "금", "토"];
    var d = REPLY.d, dateStr = "-";
    if (d && d.length === 3) {
      var dt = new Date(d[0], d[1], d[2]);
      dateStr = d[0] + "년 " + (d[1] + 1) + "월 " + d[2] + "일 (" + wds[dt.getDay()] + ")";
    }
    var name = REPLY.n || "상대방";
    $("replyTitle").textContent = "데이트 수락! 🎉";
    $("replySub").textContent = name + "님이 이렇게 데이트하고 싶대요 💑";
    document.title = "데이트 수락! 🎉";

    var rows = '<div class="row"><span class="ico">📅</span><div><div class="lbl">데이트 날짜</div><div class="val">' + dateStr + '</div></div></div>';
    var lines = (REPLY.c || []).map(function (c) {
      var line = (c.e || "💝") + " " + (c.l || "");
      if (c.o && c.o.length) line += " <span style='color:#9a7686'>— " + c.o.join(", ") + "</span>";
      return line;
    });
    rows += '<div class="row"><span class="ico">💝</span><div><div class="lbl">하고 싶은 것</div><div class="val">' + (lines.join("<br>") || "-") + '</div></div></div>';
    $("replySummary").innerHTML = rows;

    $("progress").style.display = "none";
    $(steps[current]).classList.remove("active");
    $("stepReply").classList.add("active");
  }

  if (MODE === "reply" && REPLY) renderReply();

})();
</script>
</body>
</html>
