<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    background: linear-gradient(135deg, #ffd9e6 0%, #ffe6f0 45%, #efe0ff 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; color: #4a2c3a;
  }
  .hearts { position: absolute; inset: 0; overflow: hidden; }
  .hearts span { position: absolute; opacity: 0.5; }
  .h1 { top: 70px;  left: 120px;  font-size: 64px; transform: rotate(-15deg); }
  .h2 { top: 120px; right: 140px; font-size: 88px; transform: rotate(12deg); }
  .h3 { bottom: 80px; left: 180px; font-size: 76px; transform: rotate(8deg); }
  .h4 { bottom: 110px; right: 160px; font-size: 56px; transform: rotate(-10deg); }
  .h5 { top: 300px; left: 60px; font-size: 44px; transform: rotate(20deg); }
  .h6 { top: 330px; right: 70px; font-size: 50px; transform: rotate(-18deg); }

  .card {
    position: relative; z-index: 2;
    background: rgba(255, 255, 255, 0.72);
    border-radius: 40px;
    padding: 60px 90px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(255, 111, 145, 0.25);
  }
  .big { font-size: 120px; line-height: 1; margin-bottom: 18px; }
  .title {
    font-size: 82px; font-weight: 800; letter-spacing: -1px;
    background: linear-gradient(135deg, #ff6f91, #b892ff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    margin-bottom: 20px;
  }
  .sub { font-size: 38px; font-weight: 600; color: #9a7686; }
</style>
</head>
<body>
  <div class="hearts">
    <span class="h1">💗</span><span class="h2">💕</span><span class="h3">💖</span>
    <span class="h4">🩷</span><span class="h5">💘</span><span class="h6">💝</span>
  </div>
  <div class="card">
    <div class="big">💕</div>
    <div class="title">나랑 데이트할래?</div>
    <div class="sub">너에게 신청하는 특별한 데이트 💌</div>
  </div>
</body>
</html>
